services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      target: production
    container_name: farmops-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GEE_SERVICE_ACCOUNT=${GEE_SERVICE_ACCOUNT}
      - IMD_API_KEY=${IMD_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - AGMARKNET_ENABLED=${AGMARKNET_ENABLED:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - farmops-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: production
    container_name: farmops-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_API_URL=${VITE_API_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - farmops-network

networks:
  farmops-network:
    driver: bridge
